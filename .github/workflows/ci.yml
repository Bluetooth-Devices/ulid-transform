name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: pre-commit/action@v3.0.1

  # Make sure commit messages follow the conventional commits convention:
  # https://www.conventionalcommits.org
  commitlint:
    name: Lint Commit Messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6.2.1

  test:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "3.14t"

        os:
          - ubuntu-latest
          - macOS-latest
        extension:
          - "skip_extension"
          - "use_extension"
        include:
          - python-version: "3.13"
            os: windows-latest
            extension: "skip_extension"
          - python-version: "3.13"
            os: windows-latest
            extension: "use_extension"
    runs-on: ${{ matrix.os }}
    env:
      POETRY_VIRTUALENVS_IN_PROJECT: "true"
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        id: setup-uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install poetry
        run: uv tool install poetry
      - name: Cache poetry virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: poetry-${{ runner.os }}-${{ steps.setup-uv.outputs.python-version }}-${{ matrix.extension }}-${{ hashFiles('poetry.lock') }}
      - name: Install Dependencies
        # the separate `pip install` phase is required because Poetry
        # appears to hide the output of `pip install` commands (and possibly
        # doesn't pass all environment variables through to the build)
        run: |
          pip install --no-cache -v -e .
          poetry install --only=main,dev
        shell: bash
        env:
          REQUIRE_EXTENSION: ${{ matrix.extension == 'use_extension' }}
          SKIP_EXTENSION: ${{ matrix.extension == 'skip_extension' }}
      - name: Test with Pytest
        run: poetry run pytest -v -Wdefault --cov=ulid_transform --cov-report=term-missing:skip-covered --cov-report=xml tests
        shell: bash
        env:
          REQUIRE_EXTENSION: ${{ matrix.extension == 'use_extension' }}
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  test32bit:
    name: "Test on 32-bit Alpine Linux"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Alpine Linux v3.22 for x86
        id: setup-alpine
        continue-on-error: true
        uses: jirutka/setup-alpine@v1
        with:
          arch: x86
          branch: v3.22
      - name: Retry Setup Alpine Linux v3.22 for x86
        if: steps.setup-alpine.outcome == 'failure'
        uses: jirutka/setup-alpine@v1
        with:
          arch: x86
          branch: v3.22
      - name: Set up Python
        run: |
          apk add gcc g++ musl-dev python3-dev py3-pip poetry libffi-dev
        shell: alpine.sh --root {0}
      - name: Install Dependencies
        run: |
          REQUIRE_EXTENSION=1 poetry -vvv install --only=main,dev
        shell: alpine.sh --root {0}
      - name: Test with Pytest
        run: poetry run pytest -v -Wdefault --cov=ulid_transform --cov-report=term-missing:skip-covered --cov-report=xml tests
        shell: alpine.sh --root  {0}

  sdist_safe_path:
    name: "sdist install under PYTHONSAFEPATH"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build sdist
        run: |
          pip install poetry
          poetry build -f sdist
        shell: bash
      - name: Install sdist under PYTHONSAFEPATH (regression guard for #137)
        run: |
          PYTHONSAFEPATH=1 REQUIRE_EXTENSION=1 pip install -v dist/*.tar.gz
        shell: bash
      - name: Verify the C extension imports
        run: |
          PYTHONSAFEPATH=1 python -c "import ulid_transform._ulid_impl; from ulid_transform import ulid_now; print(ulid_now())"
        shell: bash

  benchmark:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.13"
        os:
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    env:
      POETRY_VIRTUALENVS_IN_PROJECT: "true"
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        id: setup-uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install poetry
        run: uv tool install poetry
      - name: Cache poetry virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: poetry-${{ runner.os }}-${{ steps.setup-uv.outputs.python-version }}-benchmark-${{ hashFiles('poetry.lock') }}
      - name: Install Dependencies
        run: poetry install --only=main,dev,benchmark
        env:
          REQUIRE_EXTENSION: 1
      - name: Run benchmarks
        run: |
          poetry run pytest bench --benchmark-autosave
          echo '# Benchmark Results' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          poetry run pytest-benchmark compare --columns=mean,ops >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        shell: bash

  codspeed_benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Install poetry
        run: uv tool install poetry
      - name: Setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: 3.13
          cache: "poetry"
      - name: Install Dependencies
        run: |
          REQUIRE_EXTENSION=1 poetry install --only=main,dev
        shell: bash
      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          token: ${{ secrets.CODSPEED_TOKEN }}
          run: poetry run pytest --no-cov -vvvvv --codspeed tests/benchmarks
          mode: instrumentation

  # Dry run on PRs and non-main pushes. No environment, no publish
  # permissions, no OIDC, so PR runs carry no release blast radius.
  release-dry-run:
    needs:
      - test
      - lint
      - test32bit
      - commitlint
      - sdist_safe_path
    if: github.ref_name != 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
      - name: Create local branch name
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: git switch -C "$BRANCH"
      - name: Test release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          no_operation_mode: true

  # Real release, only on main. The release environment and write/OIDC
  # permissions are scoped to this job so they never apply to PR runs.
  release:
    needs:
      - test
      - lint
      - test32bit
      - commitlint
      - sdist_safe_path
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: release
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: write
    outputs:
      released: ${{ steps.release.outputs.released }}
      newest_release_tag: ${{ steps.release.outputs.tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.ref_name }}

      - name: Create local branch name
        env:
          BRANCH: ${{ github.ref_name }}
        run: git switch -C "$BRANCH"

      # On main branch: actual PSR + upload to PyPI & GitHub
      - name: Release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        id: release
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        if: steps.release.outputs.released == 'true'

      - name: Publish package distributions to GitHub Releases
        uses: python-semantic-release/upload-to-gh-release@main
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  build_wheels:
    needs: [release]
    if: needs.release.outputs.released == 'true'
    name: Wheels for ${{ matrix.os }} (${{ matrix.musl == 'musllinux' && 'musllinux' || 'manylinux' }}) ${{ matrix.qemu }} ${{ matrix.pyver }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-24.04-arm, ubuntu-latest, macos-latest]
        qemu: [""]
        musl: [""]
        pyver: [""]
        include:
          - os: ubuntu-latest
            musl: "musllinux"
          - os: ubuntu-24.04-arm
            musl: "musllinux"
          # qemu is slow, make a single
          # runner per Python version
          - os: ubuntu-24.04-arm
            qemu: armv7l
            musl: "musllinux"
            pyver: cp311
          - os: ubuntu-24.04-arm
            qemu: armv7l
            musl: "musllinux"
            pyver: cp312
          - os: ubuntu-24.04-arm
            qemu: armv7l
            musl: "musllinux"
            pyver: cp313
          - os: ubuntu-24.04-arm
            qemu: armv7l
            musl: "musllinux"
            pyver: cp314
          - os: ubuntu-24.04-arm
            qemu: armv7l
            musl: "musllinux"
            pyver: cp314t
          # qemu is slow, make a single
          # runner per Python version
          - os: ubuntu-24.04-arm
            qemu: armv7l
            musl: ""
            pyver: cp311
          - os: ubuntu-24.04-arm
            qemu: armv7l
            musl: ""
            pyver: cp312
          - os: ubuntu-24.04-arm
            qemu: armv7l
            musl: ""
            pyver: cp313
          - os: ubuntu-24.04-arm
            qemu: armv7l
            musl: ""
            pyver: cp314
          - os: ubuntu-24.04-arm
            qemu: armv7l
            musl: ""
            pyver: cp314t
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.newest_release_tag }}
          fetch-depth: 0
      # Used to host cibuildwheel
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Set up QEMU
        if: ${{ matrix.qemu }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all
          # This should be temporary
          # xref https://github.com/docker/setup-qemu-action/issues/188
          # xref https://github.com/tonistiigi/binfmt/issues/215
          image: tonistiigi/binfmt:qemu-v8.1.5
        id: qemu
      - name: Prepare emulation
        if: ${{ matrix.qemu }}
        run: |
          if [[ -n "${{ matrix.qemu }}" ]]; then
            # Build emulated architectures only if QEMU is set,
            # use default "auto" otherwise
            echo "CIBW_ARCHS_LINUX=${{ matrix.qemu }}" >> $GITHUB_ENV
          fi
      - name: Limit to a specific Python version on slow QEMU
        if: ${{ matrix.pyver }}
        run: |
          if [[ -n "${{ matrix.pyver }}" ]]; then
            echo "CIBW_BUILD=${{ matrix.pyver }}*" >> $GITHUB_ENV
          fi
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_SKIP: cp36-* cp37-* cp38-* cp39-* cp310-* pp* ${{ matrix.musl == 'musllinux' && '*manylinux*' || '*musllinux*' }}
          REQUIRE_EXTENSION: 1

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.musl }}-${{ matrix.pyver }}-${{ matrix.qemu }}
          path: ./wheelhouse/*.whl

  upload_pypi:
    needs: [build_wheels]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write # IMPORTANT: this permission is mandatory for trusted publishing

    steps:
      - uses: actions/download-artifact@v8
        with:
          # unpacks default artifact into dist/
          # if `name: artifact` is omitted, the action will create extra parent dir
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - uses:
          pypa/gh-action-pypi-publish@v1.14.0

          # To test: repository_url: https://test.pypi.org/legacy/
